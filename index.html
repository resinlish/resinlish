<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Product Showcase</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }
        header {
            background: #000;
            color: #fff;
            padding: 20px;
            text-align: center;
            font-size: 28px;
            letter-spacing: 2px;
        }
        .container {
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }
        .product {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .product:hover {
            transform: scale(1.03);
        }
        .product img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }
        .product-info {
            padding: 15px;
            text-align: center;
        }
        .product-info h3 {
            margin: 10px 0;
        }
        .product-info p {
            color: #555;
            font-size: 14px;
        }
        .price {
            margin-top: 8px;
            font-weight: bold;
            color: #000;
        }
        footer {
            background: #000;
            color: #fff;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<header>
    MY PRODUCT COLLECTION
</header>

<div class="container">

   <div class="product">
    <a href="product1.html">
        <img src="image1.jpg" alt="Product 1">
        <div class="product-info">
            <h3>Resin Jhumkay</h3>
            <p>Handmade premium resin product</p>
            <div class="price">Rs. 999</div>
        </div>
    </a>
</div>

    <div class="product">
    <a href="product2.html">
        <img src="image2.jpg" alt="Product 2">
        <div class="product-info">
            <h3>Resin Bookmark</h3>
            <p>Handmade premium resin product</p>
            <div class="price">Rs. 999</div>
        </div>
    </a>
</div>

    <div class="product">
    <a href="product3.html">
        <img src="image3.jpg" alt="Product 3">
        <div class="product-info">
            <h3>Resin Plate</h3>
            <p>Handmade premium resin product</p>
            <div class="price">Rs. 999</div>
        </div>
    </a>
</div>

</div>

<footer>
    © 2025 | Your Brand Name
</footer>

</body>
</html>
